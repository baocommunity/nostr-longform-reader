<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nostr Long-Form Reader</title>
  <style>
    :root {
      --bg: #080809;
      --surface: rgba(15, 15, 17, 0.72);
      --surface-solid: #0f0f11;
      --surface-2: rgba(255, 255, 255, 0.04);
      --text: #f2f2f0;
      --muted: #7d7d85;
      --accent: #e8a043;
      --accent-dim: rgba(232, 160, 67, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: "";
      position: fixed;
      inset: -50%;
      z-index: -2;
      background:
        radial-gradient(circle at 20% 10%, rgba(232, 160, 67, 0.10) 0%, transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(232, 160, 67, 0.07) 0%, transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(200, 120, 40, 0.06) 0%, transparent 40%);
      animation: drift 24s ease-in-out infinite alternate;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at 50% 0%, black 0%, transparent 75%);
      pointer-events: none;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-2%, 2%) scale(1.05); }
    }

    header {
      position: relative;
      padding: 4rem 1rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
      font-weight: 500;
    }

    header p {
      margin: 0 auto;
      max-width: 420px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.5rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.8s infinite;
    }

    .status-dot.connected {
      background: #3ddc84;
      box-shadow: 0 0 10px rgba(61, 220, 132, 0.5);
      animation: none;
    }

    .status-dot.error {
      background: #ff5f57;
      box-shadow: 0 0 10px rgba(255, 95, 87, 0.4);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }

    #result-count {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.35rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .mode-toggle button {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 0.45rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .mode-toggle button.active {
      background: var(--accent);
      color: #0a0a0b;
      box-shadow: 0 4px 18px rgba(232, 160, 67, 0.25);
    }

    .mode-toggle button:not(.active):hover {
      color: var(--text);
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .hashtag {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      font-size: 0.85rem;
      color: var(--muted);
      transition: all 0.2s ease;
    }

    .hashtag:hover {
      border-color: rgba(232, 160, 67, 0.5);
      color: var(--text);
      transform: translateY(-1px);
    }

    .hashtag input {
      appearance: none;
      width: 14px;
      height: 14px;
      margin: 0;
      border: 1.5px solid var(--muted);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
    }

    .hashtag input:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .hashtag input:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #0a0a0b;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    .hashtag.selected {
      background: var(--accent-dim);
      border-color: rgba(232, 160, 67, 0.45);
      color: var(--text);
    }

    .hashtag .count {
      color: var(--muted);
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
    }

    .articles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .article {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .article::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(232,160,67,0.18), transparent 40%, transparent 60%, rgba(232,160,67,0.08));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .article:hover {
      transform: translateY(-4px);
      border-color: rgba(232, 160, 67, 0.35);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(232, 160, 67, 0.08);
    }

    .article:hover::before {
      opacity: 1;
    }

    .article-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .article-title a:hover {
      color: var(--accent);
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: auto;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .author-pic {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: border-color 0.2s ease;
    }

    .article:hover .author-pic {
      border-color: rgba(232, 160, 67, 0.35);
    }

    .author-name {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 500;
    }

    .timestamp {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .article-tag {
      font-size: 0.72rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .skeleton {
      animation: shimmer 1.8s infinite;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      grid-column: 1 / -1;
      font-size: 1rem;
    }

    .error-box {
      background: rgba(255, 95, 87, 0.08);
      border: 1px solid rgba(255, 95, 87, 0.35);
      color: #ff8a80;
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      grid-column: 1 / -1;
    }

    .hashtag-toggle {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .hashtag-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .article-tag.more {
      background: var(--accent-dim);
      border-color: rgba(232, 160, 67, 0.25);
      color: var(--accent);
    }

    @media (max-width: 640px) {
      header { padding: 2.5rem 1rem 1.75rem; }
      main { padding: 1.75rem 1rem 3rem; }
      .articles { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nostr <span>Long-Form</span> Reader</h1>
    <p>Latest kind:30023 articles from the Nostr network</p>
    <div class="status" id="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting to relays…</span>
    </div>
  </header>

  <main>
    <div class="controls">
      <div id="result-count">0 articles</div>
      <div class="mode-toggle" id="mode-toggle">
        <button data-mode="OR" class="active">OR</button>
        <button data-mode="AND">AND</button>
      </div>
    </div>

    <div class="hashtags" id="hashtags"></div>

    <div class="articles" id="articles">
      <div class="empty">Loading articles from relays…</div>
    </div>
  </main>

  <script>
    const RELAYS = [
      'wss://nos.lol',
      'wss://relay.snort.social',
      'wss://nostr.mom',
      'wss://relay.damus.io',
      'wss://relay.nostr.band'
    ];

    const TARGET = 21;
    const KIND_LONG_FORM = 30023;
    const KIND_METADATA = 0;

    const state = {
      articles: new Map(),
      authors: new Map(),
      hashtagCounts: new Map(),
      selected: new Set(),
      mode: 'OR',
      activeRelays: 0,
      failedRelays: 0,
      eoseReceived: 0,
      sockets: [],
      collecting: true,
      finished: false,
      showAllHashtags: false
    };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function setStatus(text, type = 'loading') {
      $('#status-text').textContent = text;
      const dot = $('#status-dot');
      dot.className = 'status-dot';
      if (type === 'connected') dot.classList.add('connected');
      if (type === 'error') dot.classList.add('error');
    }

    function normalizeHashtag(t) {
      return t.toLowerCase().trim();
    }

    function getTagValue(event, name) {
      const tag = event.tags.find(t => t[0] === name);
      return tag ? tag[1] : undefined;
    }

    function getHashtags(event) {
      return event.tags
        .filter(t => t[0] === 't' && t[1])
        .map(t => normalizeHashtag(t[1]));
    }

    function getTitle(event) {
      const fromTag = getTagValue(event, 'title');
      if (fromTag) return fromTag;
      if (!event.content) return 'Untitled article';
      const lines = event.content.split('\n').map(l => l.trim()).filter(Boolean);
      const bech32ish = /^n(pub|ote|event|addr|profile)1[\w]+$/;
      for (const line of lines) {
        const cleaned = line.replace(/^#+\s*/, '');
        if (cleaned.length > 120) continue;
        if (cleaned.length > 40 && !cleaned.includes(' ')) continue;
        if (bech32ish.test(cleaned)) continue;
        return cleaned.slice(0, 120);
      }
      return 'Untitled article';
    }

    function formatDate(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function npub(pubkey) {
      // Simple bech32 not available without deps; show hex prefix.
      return pubkey.slice(0, 12) + '…' + pubkey.slice(-6);
    }

    function updateCounts() {
      state.hashtagCounts.clear();
      for (const article of state.articles.values()) {
        for (const tag of getHashtags(article)) {
          state.hashtagCounts.set(tag, (state.hashtagCounts.get(tag) || 0) + 1);
        }
      }
    }

    function renderHashtags() {
      const container = $('#hashtags');
      const sorted = [...state.hashtagCounts.entries()].sort((a, b) => b[1] - a[1]);
      const VISIBLE = 20;
      const visibleTags = state.showAllHashtags ? sorted : sorted.slice(0, VISIBLE);
      container.innerHTML = '';

      for (const [tag, count] of visibleTags) {
        const label = document.createElement('label');
        label.className = 'hashtag' + (state.selected.has(tag) ? ' selected' : '');
        const checked = state.selected.has(tag) ? 'checked' : '';
        label.innerHTML = `<input type="checkbox" value="${escapeHtml(tag)}" ${checked}> #${escapeHtml(tag)} <span class="count">${count}</span>`;
        label.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) state.selected.add(tag);
          else state.selected.delete(tag);
          renderHashtags();
          renderArticles();
        });
        container.appendChild(label);
      }

      if (sorted.length > VISIBLE) {
        const btn = document.createElement('button');
        btn.className = 'hashtag-toggle';
        btn.textContent = state.showAllHashtags ? 'Show fewer' : `+${sorted.length - VISIBLE} more`;
        btn.addEventListener('click', () => {
          state.showAllHashtags = !state.showAllHashtags;
          renderHashtags();
        });
        container.appendChild(btn);
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function authorHtml(pubkey) {
      const meta = state.authors.get(pubkey) || {};
      const name = meta.display_name || meta.name || npub(pubkey);
      const pic = meta.picture;
      const img = pic
        ? `<img class="author-pic" src="${escapeHtml(pic)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="author-pic" style="display:flex;align-items:center;justify-content:center;font-size:0.7rem;background:var(--surface-2);color:var(--muted);">${escapeHtml(name.slice(0, 2).toUpperCase())}</div>`;
      return `${img}<span class="author-name">${escapeHtml(name)}</span>`;
    }

    function articleMatches(article) {
      if (state.selected.size === 0) return true;
      const tags = new Set(getHashtags(article));
      if (state.mode === 'AND') {
        return [...state.selected].every(t => tags.has(t));
      }
      return [...state.selected].some(t => tags.has(t));
    }

    function renderArticles() {
      const container = $('#articles');
      const filtered = [...state.articles.values()].filter(articleMatches);
      $('#result-count').textContent = `${filtered.length} article${filtered.length === 1 ? '' : 's'}`;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty">No articles match the selected hashtags.</div>';
        return;
      }

      container.innerHTML = filtered.map(article => {
        const title = getTitle(article);
        const tags = getHashtags(article);
        const MAX_TAGS = 7;
        const visibleTags = tags.slice(0, MAX_TAGS);
        const remaining = tags.length - MAX_TAGS;
        const tagHtml = tags.length
          ? `<div class="article-tags">${visibleTags.map(t => `<span class="article-tag">#${escapeHtml(t)}</span>`).join('')}${remaining > 0 ? `<span class="article-tag more">+${remaining}</span>` : ''}</div>`
          : '';
        const neventOrNaddr = `https://njump.me/${article.id}`;
        return `
          <article class="article">
            <h2 class="article-title"><a href="${neventOrNaddr}" target="_blank" rel="noopener">${escapeHtml(title)}</a></h2>
            ${tagHtml}
            <div class="article-meta">
              ${authorHtml(article.pubkey)}
              <time class="timestamp" datetime="${new Date(article.created_at * 1000).toISOString()}">${formatDate(article.created_at)}</time>
            </div>
          </article>
        `;
      }).join('');
    }

    function finalizeArticles() {
      // Keep only the TARGET most recent articles.
      const sorted = [...state.articles.values()].sort((a, b) => b.created_at - a.created_at);
      state.articles.clear();
      for (const article of sorted.slice(0, TARGET)) {
        state.articles.set(article.id, article);
      }
    }

    function maybeDone() {
      finalizeArticles();
      updateCounts();
      renderHashtags();
      renderArticles();
    }

    function finishCollection() {
      if (state.finished) return;
      state.finished = true;
      state.collecting = false;
      for (const ws of state.sockets) {
        try { ws.close(); } catch {}
      }
      maybeDone();
      fetchMissingAuthors();
      setStatus(`Loaded ${state.articles.size} article${state.articles.size === 1 ? '' : 's'}`, state.articles.size ? 'connected' : 'error');
    }

    function connectRelay(url) {
      return new Promise((resolve) => {
        let closed = false;
        const ws = new WebSocket(url);
        state.sockets.push(ws);

        ws.onopen = () => {
          state.activeRelays++;
          setStatus(`Connected to ${state.activeRelays} relay${state.activeRelays === 1 ? '' : 's'}`, 'connected');
          const subId = 'articles-' + Math.random().toString(36).slice(2, 10);
          ws.send(JSON.stringify(['REQ', subId, { kinds: [KIND_LONG_FORM], limit: TARGET }]));
        };

        ws.onmessage = (e) => {
          if (!state.collecting) return;
          let msg;
          try { msg = JSON.parse(e.data); } catch { return; }
          if (!Array.isArray(msg) || msg.length < 2) return;
          const [type, , payload] = msg;
          if (type === 'EVENT' && payload && payload.kind === KIND_LONG_FORM) {
            if (!state.articles.has(payload.id)) {
              state.articles.set(payload.id, payload);
              setStatus(`Found ${state.articles.size} of ${TARGET} articles…`, 'loading');
              if (state.articles.size >= TARGET) {
                finishCollection();
              }
            }
          } else if (type === 'EOSE') {
            state.eoseReceived++;
            if (state.eoseReceived >= RELAYS.length - state.failedRelays) {
              finishCollection();
            }
          }
        };

        ws.onerror = () => {
          if (!closed) {
            state.failedRelays++;
          }
        };

        ws.onclose = () => {
          closed = true;
          state.activeRelays = Math.max(0, state.activeRelays - 1);
          resolve();
        };

        setTimeout(() => {
          if (ws.readyState !== WebSocket.OPEN && ws.readyState !== WebSocket.CLOSING) {
            ws.close();
            state.failedRelays++;
            resolve();
          }
        }, 8000);
      });
    }

    function fetchMissingAuthors() {
      const pubkeys = [...state.articles.values()]
        .map(a => a.pubkey)
        .filter(pk => !state.authors.has(pk));
      if (pubkeys.length === 0) return;
      requestFromAllRelays({ kinds: [KIND_METADATA], authors: pubkeys });
    }

    function requestFromAllRelays(filter) {
      for (const url of RELAYS) {
        try {
          const ws = new WebSocket(url);
          const subId = 'meta-' + Math.random().toString(36).slice(2, 10);
          ws.onopen = () => ws.send(JSON.stringify(['REQ', subId, filter]));
          ws.onmessage = (e) => {
            let msg;
            try { msg = JSON.parse(e.data); } catch { return; }
            if (msg[0] === 'EVENT' && msg[2] && msg[2].kind === KIND_METADATA) {
              try {
                const meta = JSON.parse(msg[2].content);
                state.authors.set(msg[2].pubkey, meta);
                renderArticles();
              } catch {}
            }
          };
          setTimeout(() => ws.close(), 8000);
        } catch {}
      }
    }

    $('#mode-toggle').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      $$('#mode-toggle button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      state.mode = e.target.dataset.mode;
      renderArticles();
    });

    // Start
    Promise.all(RELAYS.map(connectRelay)).then(() => {
      finishCollection();
    });

    // Hard cutoff to ensure we don't wait forever.
    setTimeout(() => {
      finishCollection();
    }, 15000);

    // Retry metadata fetch after a few seconds for slow relays.
    setTimeout(() => {
      fetchMissingAuthors();
      renderArticles();
    }, 6000);
  </script>
</body>
</html>
